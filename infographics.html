<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviation English — Infographics</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, "Palatino Linotype", serif;
      background: #e7dfd2;
      color: #2f2822;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .module { width: 100%; max-width: 1040px; margin: 0 auto; }

    .back {
      display: inline-block;
      margin-bottom: 14px;
      color: #7a6858;
      text-decoration: none;
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 14px;
    }

    .header {
      background: #f8f3e9;
      border: 1px solid #d4c7b3;
      border-radius: 22px;
      padding: 34px 38px;
      margin-bottom: 18px;
    }

    .title { font-size: 32px; line-height: 1.2; margin-bottom: 8px; }

    .subtitle {
      font-size: 17px;
      color: #7a6858;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .item {
      background: #f8f3e9;
      border: 1px solid #d4c7b3;
      border-radius: 18px;
      padding: 14px;
      cursor: zoom-in;
      display: flex;
      flex-direction: column;
      transition: border-color 0.12s, transform 0.12s;
    }

    .item:hover { border-color: #b8a891; transform: translateY(-2px); }

    .item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      background: #fff;
      display: block;
    }

    .item h2 {
      font-size: 16px;
      line-height: 1.35;
      margin-top: 12px;
      color: #2f2822;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(20, 16, 12, 0.94);
      display: none;
      flex-direction: column;
      z-index: 50;
    }
    .lightbox.is-open { display: flex; }

    .lightbox-stage {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: zoom-out;
    }
    .lightbox-stage.zoomed { cursor: grab; }
    .lightbox-stage.grabbing { cursor: grabbing; }
    .lightbox-stage.grabbing img { transition: none; }
    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 10px;
      transform: translate(0px, 0px) scale(1);
      transform-origin: center center;
      transition: transform 0.12s ease-out;
      will-change: transform;
      touch-action: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lightbox-close {
      position: fixed;
      top: 18px;
      right: 22px;
      color: #f8f3e9;
      font-size: 34px;
      line-height: 1;
      font-family: Arial, sans-serif;
      cursor: pointer;
      border: none;
      background: none;
      z-index: 2;
    }

    .lightbox-zoom {
      position: fixed;
      top: 18px;
      left: 22px;
      display: flex;
      gap: 8px;
      z-index: 2;
    }
    .lightbox-zoom button {
      min-width: 40px;
      height: 40px;
      padding: 0 10px;
      border-radius: 9px;
      border: 1px solid #d4c7b3;
      background: #f8f3e9;
      color: #2f2822;
      font-size: 20px;
      line-height: 1;
      font-family: "SF Pro Text", Arial, sans-serif;
      cursor: pointer;
    }
    .lightbox-zoom button#zoom-reset { font-size: 14px; font-weight: 600; }
    .lightbox-zoom button:hover { background: #efe6d8; border-color: #b8a891; }

    .lightbox-actions {
      flex: 0 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 12px 16px calc(14px + env(safe-area-inset-bottom));
      background: rgba(20, 16, 12, 0.55);
    }
    .lightbox-link {
      color: #2f2822;
      background: #f8f3e9;
      border: 1px solid #d4c7b3;
      border-radius: 10px;
      padding: 10px 18px;
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }
    .lightbox-link:hover { background: #efe6d8; border-color: #b8a891; }
    .lightbox-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .lightbox-open-full {
      color: #f8f3e9;
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 14px;
      text-decoration: underline;
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      body { padding: 24px 12px; }
      .grid { grid-template-columns: 1fr; }
      .header { padding: 26px 22px; }
      .title { font-size: 27px; }
      .item img { height: 220px; }
    }
  </style>
</head>
<body>
  <main class="module">
    <a href="index.html" class="back">&larr; All quizzes</a>

    <header class="header">
      <h1 class="title">Aviation English — Infographics</h1>
      <p class="subtitle">Visual references for ICAO exam prep. Tap any image to view it full size.</p>
    </header>

    <section class="grid" id="grid" aria-label="Infographics"></section>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <div class="lightbox-zoom" aria-label="Zoom controls">
      <button id="zoom-out" type="button" aria-label="Zoom out">&minus;</button>
      <button id="zoom-reset" type="button" aria-label="Reset zoom">Fit</button>
      <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
    </div>
    <div class="lightbox-stage" id="lightbox-stage">
      <img id="lightbox-img" src="" alt="">
    </div>
    <div class="lightbox-actions">
      <div class="lightbox-links" id="lightbox-links"></div>
      <a class="lightbox-open-full" id="lightbox-full" href="#" target="_blank" rel="noopener">Open original PNG in new tab</a>
    </div>
  </div>

  <script>
    const images = [
      { file: "emergency-management",     title: "Emergency Management — Pilot Guide" },
      { file: "starting-up",              title: "Aviation English — Starting Up" },
      { file: "v-speeds-flight-phases",   title: "V-Speeds Through the Flight Phases" },
      { file: "bristell-autopilot",       title: "Bristell Autopilot" },
      { file: "vibrations",               title: "Vibrations" },
      { file: "safe-safety-safely",       title: "Safe / Safety / Safely" },
      { file: "describing-picture-1",     title: "Describing a Picture (1)" },
      { file: "describing-picture-2",     title: "Describing a Picture (2)" },
      { file: "it-depends-on",            title: "It Depends On — Decision-Making", links: [
        { href: "songs.html#it-depends-on-safety", label: "&#9654; Listen to the song" },
        { href: "it-depends-on-aviation-english-quiz.html", label: "Take the It Depends On quiz" },
        { href: "aviation_english_cockpit_class/aviation_english_cockpit_class.html", label: "Enter the Cockpit Class" }
      ] },
      { file: "present-perfect-in-aviation", title: "Present Perfect in Aviation", links: [
        { href: "aviation_english_cockpit_class/aviation_present_perfect_trainer.html", label: "Enter the Cockpit Class" },
        { href: "Crosswords/present-perfect-1.html", label: "Solve the crossword" },
        { href: "songs.html#present-result-now", label: "&#9654; Listen to the songs" }
      ] },
      { file: "passive-voice-for-aviation", title: "Passive Voice for Aviation English", links: [
        { href: "aviation_english_cockpit_class/passive_voice_for_aviation_english.html", label: "Enter the Cockpit Class" },
        { href: "aviation-passive-voice-quiz.html", label: "Take the Passive Voice quiz" }
      ] }
    ];

    const grid = document.getElementById("grid");
    const lightbox = document.getElementById("lightbox");
    const stage = document.getElementById("lightbox-stage");
    const lightboxImg = document.getElementById("lightbox-img");
    const lightboxFull = document.getElementById("lightbox-full");
    const lightboxLinks = document.getElementById("lightbox-links");

    images.forEach(img => {
      const thumb = `img/thumb/${img.file}.jpg`;
      const item = document.createElement("article");
      item.className = "item";
      item.innerHTML = `<img src="${thumb}" alt="${img.title}" loading="lazy"><h2>${img.title}</h2>`;
      item.addEventListener("click", () => openLightbox(img));
      grid.appendChild(item);
    });

    // --- zoom & pan state ---
    const MIN = 1, MAX = 6;
    let scale = 1, tx = 0, ty = 0;

    function applyTransform() {
      lightboxImg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
      stage.classList.toggle("zoomed", scale > 1);
    }

    function clampPan() {
      const sr = stage.getBoundingClientRect();
      const maxX = Math.max(0, (lightboxImg.clientWidth * scale - sr.width) / 2);
      const maxY = Math.max(0, (lightboxImg.clientHeight * scale - sr.height) / 2);
      tx = Math.max(-maxX, Math.min(maxX, tx));
      ty = Math.max(-maxY, Math.min(maxY, ty));
    }

    // px/py: pointer offset from stage centre (= image centre)
    function setScale(next, px = 0, py = 0) {
      next = Math.max(MIN, Math.min(MAX, next));
      const k = next / scale;
      tx = px * (1 - k) + k * tx;
      ty = py * (1 - k) + k * ty;
      scale = next;
      if (scale === 1) { tx = 0; ty = 0; }
      clampPan();
      applyTransform();
    }

    function resetZoom() { scale = 1; tx = 0; ty = 0; applyTransform(); }

    function ptrCenter(e) {
      const sr = stage.getBoundingClientRect();
      return [e.clientX - sr.left - sr.width / 2, e.clientY - sr.top - sr.height / 2];
    }

    stage.addEventListener("wheel", (e) => {
      e.preventDefault();
      const [px, py] = ptrCenter(e);
      setScale(scale * (e.deltaY < 0 ? 1.2 : 1 / 1.2), px, py);
    }, { passive: false });

    lightboxImg.addEventListener("dblclick", (e) => {
      const [px, py] = ptrCenter(e);
      setScale(scale > 1 ? 1 : 2.5, px, py);
    });

    // pointer drag pan + two-finger pinch
    const pointers = new Map();
    let pinchDist = 0, pinchScale = 1, moved = false;

    stage.addEventListener("pointerdown", (e) => {
      if (e.target !== lightboxImg && e.target !== stage) return;
      pointers.set(e.pointerId, e);
      moved = false;
      if (pointers.size === 2) {
        const [a, b] = [...pointers.values()];
        pinchDist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
        pinchScale = scale;
      }
      if (scale > 1 || pointers.size === 2) {
        stage.setPointerCapture(e.pointerId);
        stage.classList.add("grabbing");
      }
    });

    stage.addEventListener("pointermove", (e) => {
      if (!pointers.has(e.pointerId)) return;
      const prev = pointers.get(e.pointerId);
      pointers.set(e.pointerId, e);
      if (pointers.size === 2) {
        const [a, b] = [...pointers.values()];
        const dist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
        if (pinchDist > 0) {
          const sr = stage.getBoundingClientRect();
          const mx = (a.clientX + b.clientX) / 2 - sr.left - sr.width / 2;
          const my = (a.clientY + b.clientY) / 2 - sr.top - sr.height / 2;
          setScale(pinchScale * (dist / pinchDist), mx, my);
        }
        moved = true;
      } else if (scale > 1) {
        tx += e.clientX - prev.clientX;
        ty += e.clientY - prev.clientY;
        moved = true;
        clampPan();
        applyTransform();
      }
    });

    function endPointer(e) {
      pointers.delete(e.pointerId);
      if (pointers.size < 2) pinchDist = 0;
      if (pointers.size === 0) stage.classList.remove("grabbing");
    }
    stage.addEventListener("pointerup", endPointer);
    stage.addEventListener("pointercancel", endPointer);

    document.getElementById("zoom-in").addEventListener("click", () => setScale(scale * 1.3));
    document.getElementById("zoom-out").addEventListener("click", () => setScale(scale / 1.3));
    document.getElementById("zoom-reset").addEventListener("click", resetZoom);

    function openLightbox(img) {
      const full = `img/${img.file}.png`;
      resetZoom();
      lightboxImg.src = full;
      lightboxImg.alt = img.title;
      lightboxFull.href = full;
      const links = img.links || (img.link ? [img.link] : []);
      lightboxLinks.innerHTML = links.map(
        l => `<a class="lightbox-link" href="${l.href}">${l.label}</a>`
      ).join("");
      lightbox.classList.add("is-open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("is-open");
      lightboxImg.src = "";
      resetZoom();
      document.body.style.overflow = "";
    }

    lightbox.addEventListener("click", (e) => {
      if (moved) { moved = false; return; }            // ignore the click that ends a drag
      if (e.target === lightboxImg) return;             // image is interactive (zoom/pan)
      if (e.target.closest(".lightbox-actions") || e.target.closest(".lightbox-zoom")) return;
      if (e.target === document.getElementById("lightbox-close")) return;
      closeLightbox();
    });
    document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLightbox();
    });
  </script>
    <footer style="text-align:center;padding:28px 16px;font-family:'SF Pro Text',Arial,sans-serif;"><a href="index.html" style="color:#7a6858;font-size:15px;text-decoration:none;border-bottom:1px solid currentColor;padding-bottom:2px;">&larr; All quizzes</a></footer>
</body>
</html>
