  <style>
    :root {
      /* Daylight (site warm parchment theme) */
      --bg: #e7dfd2;
      --panel: #f8f3e9;
      --sheet-bg: #f4ede0;
      --border: #d4c7b3;
      --border-hover: #b8a891;
      --text: #2f2822;
      --text2: #4a3e34;
      --muted: #7a6858;
      --accent: #b07d3a;
      --btn-bg: #fffbf4;
      --btn-hover: #efe6d8;
      --cover-bg: #ffffff;
      --hr: #e2d6c2;
      --card-shadow: 0 8px 22px rgba(80, 60, 40, 0.14);
    }

    .night-ops {
      /* Night (warm espresso, same brand as index) */
      --bg: #1c1611;
      --panel: #261e17;
      --sheet-bg: #2e251c;
      --border: #3d3226;
      --border-hover: #4a3d2e;
      --text: #efe6d8;
      --text2: #cdbfad;
      --muted: #9a8a76;
      --accent: #d8a657;
      --btn-bg: #2e251c;
      --btn-hover: #3d3226;
      --cover-bg: #1c1611;
      --hr: #3d3226;
      --card-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, "Palatino Linotype", serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .module { width: 100%; max-width: 1040px; margin: 0 auto; }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 18px;
      z-index: 60;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 30px;
      padding: 8px 14px;
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .theme-toggle:hover { background: var(--btn-hover); border-color: var(--border-hover); }
    .theme-toggle svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; }

    .back {
      display: inline-block;
      margin-bottom: 14px;
      color: var(--muted);
      text-decoration: none;
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 14px;
    }

    .header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 34px 38px;
      margin-bottom: 18px;
    }

    .title { font-size: 32px; line-height: 1.2; margin-bottom: 8px; }
    .subtitle { font-size: 17px; color: var(--muted); line-height: 1.5; }

    /* Card grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      text-align: left;
      padding: 0;
      transition: border-color 0.12s, transform 0.12s, box-shadow 0.12s;
    }
    .card:hover, .card:focus {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: var(--card-shadow);
      outline: none;
    }

    .card-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--cover-bg);
    }
    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-play {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(34, 26, 18, 0.78);
      color: #f8f3e9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      padding-left: 3px;
    }

    .card-body { padding: 16px 18px 20px; }
    .card-body h2 { font-size: 19px; line-height: 1.3; margin-bottom: 6px; }
    .card-body p {
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--muted);
    }

    /* Detail overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 16, 12, 0.55);
      backdrop-filter: blur(3px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
      z-index: 50;
    }
    .overlay.is-open { display: flex; }

    .sheet {
      background: var(--sheet-bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      width: 100%;
      max-width: 760px;
      padding: 28px 32px 32px;
      position: relative;
    }

    .sheet-close {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--btn-bg);
      color: var(--text2);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }
    .sheet-close:hover { background: var(--btn-hover); }

    .sheet-head {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 18px;
      padding-right: 40px;
    }
    .sheet-cover {
      width: 110px;
      height: 110px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .sheet-meta h2 { font-size: 24px; line-height: 1.25; margin-bottom: 4px; }
    .sheet-meta .artist {
      color: var(--muted);
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .sheet-meta .topic { color: var(--text2); font-size: 15px; line-height: 1.45; }
    .sheet-meta .topic a { color: var(--accent); }

    .sheet audio { width: 100%; margin-bottom: 4px; }

    .lyrics {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--hr);
      font-size: 17px;
      line-height: 1.5;
    }
    .lyrics .section {
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
      margin: 18px 0 6px;
    }
    .lyrics .section:first-child { margin-top: 0; }
    .lyrics .line { color: var(--text); }
    .lyrics .blank { height: 8px; }

    /* Songs on this scene */
    .songs { margin-top: 22px; }
    .songs-head {
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding-top: 18px;
      border-top: 1px solid var(--hr);
      margin-bottom: 12px;
    }
    .song-block {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px 18px;
      margin-bottom: 14px;
    }
    .song-block summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .song-block summary::-webkit-details-marker { display: none; }
    .song-block .song-art {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .song-block .song-title {
      font-size: 19px;
      font-weight: 600;
      flex: 1;
    }
    .song-block .song-note {
      font-family: "SF Pro Text", Arial, sans-serif;
      font-size: 12px;
      color: var(--muted);
    }
    .song-block .song-caret {
      color: var(--accent);
      font-size: 13px;
      font-family: "SF Pro Text", Arial, sans-serif;
      transition: transform 0.15s;
    }
    .song-block[open] .song-caret { transform: rotate(180deg); }
    .song-block audio { width: 100%; margin: 14px 0 4px; }
    .song-block .lyrics { margin-top: 8px; border-top: none; padding-top: 8px; font-size: 16px; }

    @media (max-width: 860px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      body { padding: 24px 12px; }
      .header { padding: 26px 22px; }
      .title { font-size: 27px; }
      .grid { grid-template-columns: 1fr; }
      .sheet { padding: 24px 22px 26px; }
      .sheet-head { flex-direction: column; align-items: flex-start; }
      .sheet-cover { width: 100%; height: auto; max-width: 220px; }
    }
  </style>

    // Day/night theme — shares the "theme" key with index.html (choice persists across pages)
    const themeLabel = document.getElementById("theme-label");
    function syncThemeLabel() {
      themeLabel.textContent = document.documentElement.classList.contains("night-ops") ? "Day" : "Night";
    }
    syncThemeLabel();
    document.getElementById("theme-toggle").addEventListener("click", () => {
      const night = document.documentElement.classList.toggle("night-ops");
      try { localStorage.setItem("theme", night ? "night" : "day"); } catch (e) {}
      syncThemeLabel();
    });

    const grid = document.getElementById("grid");
    const overlay = document.getElementById("overlay");
    const sheetCover = document.getElementById("sheet-cover");
    const sheetTitle = document.getElementById("sheet-title");
    const sheetArtist = document.getElementById("sheet-artist");
    const sheetTopic = document.getElementById("sheet-topic");
    const sheetAudio = document.getElementById("sheet-audio");
    const sheetLyrics = document.getElementById("sheet-lyrics");
    const sheetSongs = document.getElementById("sheet-songs");

    function renderLyrics(text) {
      return text.split("\n").map(line => {
        const t = line.trim();
        if (t === "") return '<div class="blank"></div>';
        if (/^\[.*\]$/.test(t)) return `<div class="section">${t.slice(1, -1)}</div>`;
        return `<div class="line">${t.replace(/&/g, "&amp;").replace(/</g, "&lt;")}</div>`;
      }).join("");
    }

    items.forEach((item, i) => {
      const card = document.createElement("button");
      card.className = "card";
      card.type = "button";
      card.innerHTML = `
        <div class="card-cover">
          <img src="img/picture-description/${item.file}.jpg" alt="${item.title} picture" loading="lazy">
          <span class="card-play" aria-hidden="true">&#9654;</span>
        </div>
        <div class="card-body">
          <h2>${item.title}</h2>
          <p>${item.topic}</p>
          ${item.songs && item.songs.length ? `<p style="color:var(--accent);margin-top:6px;">&#9834; ${item.songs.length} song${item.songs.length > 1 ? "s" : ""} on this scene</p>` : ""}
        </div>
      `;
      card.addEventListener("click", () => openItem(i));
      grid.appendChild(card);
    });

    function openItem(i) {
      const item = items[i];
      sheetCover.src = `img/picture-description/${item.file}.jpg`;
      sheetCover.alt = `${item.title} picture`;
      sheetTitle.textContent = item.title;
      sheetArtist.textContent = item.artist;
      const links = item.links || (item.link ? [item.link] : []);
      sheetTopic.innerHTML = links.length
        ? `${item.topic} ${links.map(l => `&middot; <a href="${l.href}">${l.label} &rarr;</a>`).join(" ")}`
        : item.topic;
      sheetAudio.src = `audio/picture-description/${item.file}.mp3`;
      sheetLyrics.innerHTML = renderLyrics(item.lyrics);
      const songs = item.songs || [];
      sheetSongs.innerHTML = songs.length
        ? `<div class="songs-head">&#9834; Songs on this scene</div>` + songs.map(s => `
          <details class="song-block">
            <summary>
              <img class="song-art" src="img/picture-description/songs/${s.file}.jpg" alt="" loading="lazy">
              <span class="song-title">${s.title}</span>
              <span class="song-note">tap to open</span>
              <span class="song-caret">&#9660;</span>
            </summary>
            <audio controls preload="none" src="audio/picture-description/songs/${s.file}.mp3"></audio>
            <div class="lyrics">${renderLyrics(s.lyrics)}</div>
          </details>`).join("")
        : "";
      overlay.classList.add("is-open");
      document.body.style.overflow = "hidden";
      overlay.scrollTop = 0;
    }

    function closeItem() {
      overlay.classList.remove("is-open");
      sheetAudio.pause();
      sheetAudio.removeAttribute("src");
      sheetSongs.querySelectorAll("audio").forEach(a => a.pause());
      sheetSongs.innerHTML = "";
      document.body.style.overflow = "";
    }

    document.getElementById("sheet-close").addEventListener("click", closeItem);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) closeItem(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeItem(); });

    function openFromHash() {
      const file = decodeURIComponent(location.hash.slice(1));
      const i = items.findIndex(s => s.file === file);
      if (i >= 0) openItem(i);
    }
    window.addEventListener("hashchange", openFromHash);
    openFromHash();
  </script>
