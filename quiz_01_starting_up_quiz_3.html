<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Comprehension Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Palatino Linotype", serif;
      background: #e7dfd2;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #f8f3e9;
      border: 1px solid #d4c7b3;
      border-radius: 22px;
      width: 100%;
      max-width: 720px;
      padding: 32px 36px;
    }
    .progress {
      color: #888;
      font-size: 13px;
      margin-bottom: 20px;
      font-family: "SF Pro Text", sans-serif;
    }
    .question {
      font-size: 18px;
      color: #2f2822;
      margin-bottom: 24px;
      line-height: 1.55;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }
    .option {
      background: rgba(255,251,244,0.8);
      border: 1px solid #d4c7b3;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 16px;
      font-family: Georgia, serif;
      color: #2f2822;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s;
      width: 100%;
    }
    .option:hover:not(:disabled) { background: #efe6d8; }
    .option.correct { background: #c8f0c8; border-color: #4a9a4a; color: #1a5a1a; }
    .option.wrong   { background: #f0c8c8; border-color: #9a4a4a; color: #5a1a1a; }
    .option:disabled { cursor: default; }
    .explanation {
      background: #e8f5e8;
      border: 1px solid #90c890;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      color: #1a4a1a;
      margin-bottom: 14px;
      line-height: 1.5;
      display: none;
    }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .score-label {
      color: #7a6858;
      font-size: 14px;
      font-family: "SF Pro Text", sans-serif;
    }
    .btn-row { display: flex; gap: 8px; }
    .btn {
      background: rgba(255,251,244,0.55);
      border: 1px solid #d4c7b3;
      border-radius: 10px;
      padding: 8px 20px;
      font-size: 14px;
      font-family: "SF Pro Text", sans-serif;
      color: #4a3e34;
      cursor: pointer;
      transition: background 0.12s;
      min-width: 80px;
    }
    .btn:hover:not(:disabled) { background: #efe6d8; }
    .btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div class="card">
    <a href="index.html" style="display:inline-block;margin-bottom:18px;color:#7a6858;text-decoration:none;font-family:'SF Pro Text',Arial,sans-serif;font-size:14px;">&larr; All quizzes</a>
    <div class="progress" id="progress"></div>
    <div class="question" id="question"></div>
    <div class="options"  id="options"></div>
    <div class="explanation" id="explanation"></div>
    <div class="footer">
      <span class="score-label" id="score">Score: 0/0</span>
      <div class="btn-row">
        <button class="btn" id="btn-retake" onclick="retake()" style="display:none">Retake</button>
        <button class="btn" id="btn-next"   onclick="nextQ()"  disabled>Next →</button>
      </div>
    </div>
  </div>
  <script>
    const questions = [{"correct": 0, "explanation": "During abnormal situations, a congested frequency increases the risk that urgent messages cannot be transmitted or are only partially received, which can directly compromise safety.", "options": ["Pilots may be unable to pass urgent information quickly or may receive only part of a critical message.", "Controllers always stop issuing clearances when the frequency becomes busy.", "Aircraft automatically change to another frequency when transmissions are blocked."], "question": "What is the main reason why 'busy frequency' can become more dangerous during abnormal situations?"}, {"correct": 1, "explanation": "Merely hearing a transmission does not guarantee comprehension or correct action; the pilot must understand the operational meaning and confirm safety-critical information when required.", "options": ["Hearing the instruction automatically means the pilot has complied with it.", "The pilot must also understand the operational meaning and verify safety-critical details when necessary.", "ATC instructions are advisory only unless they are repeated twice."], "question": "Why is it not enough for a pilot simply to 'hear' an ATC instruction?"}, {"correct": 2, "explanation": "When a pilot's attention is split between the radio and another cockpit task, there is a real risk of missing or misinterpreting an instruction, demonstrating how distraction undermines communication safety.", "options": ["A controller uses standard phraseology during a routine frequency change.", "A pilot asks ATC to repeat an unclear message.", "A pilot misses a taxi instruction because attention is divided between radio communication and another cockpit task."], "question": "Which situation best illustrates how distraction may affect communication safety?"}, {"correct": 0, "explanation": "'Roger' indicates only that the transmission was received; it does not serve as a read-back or confirmation of safety-critical items, making it insufficient in situations where those are required.", "options": ["It only means the message was received, not that a required item has been read back or confirmed.", "It means the pilot is unable to comply with the instruction.", "It should only be used when changing frequency."], "question": "Why is 'Roger' not always an appropriate response in safety-critical communication?"}, {"correct": 1, "explanation": "Keeping transmissions concise helps to prevent frequency congestion, reducing the likelihood that important messages are blocked or missed by other users on the frequency.", "options": ["Short messages are useful only when pilots speak with strong accents.", "Concise transmissions reduce frequency congestion and lower the chance of blocking or missing information.", "Long explanations are safer because they contain more detail."], "question": "What can be inferred from the recommendation to keep messages short?"}, {"correct": 2, "explanation": "These specific items have a direct bearing on aircraft separation, correct navigation, and runway operations, so an accurate read-back is essential to confirm mutual understanding and prevent errors.", "options": ["These items are optional and are read back mainly for politeness.", "These items are only important during cruise flight.", "These items directly affect aircraft separation, navigation, and runway safety."], "question": "Why should pilots read back runway, altitude, heading, speed, squawk, and QNH clearly?"}, {"correct": 0, "explanation": "During taxi, take-off, approach, and landing, crews face elevated workloads and time pressure, leaving very little opportunity to identify and correct a misunderstanding before it leads to a serious incident.", "options": ["These phases combine high workload, limited time, and little margin for correcting an error.", "These phases require pilots to avoid all radio communication.", "These phases are normally controlled by company dispatch, not ATC."], "question": "Which option best explains why ambiguous phraseology is especially risky during taxi, take-off, approach, and landing?"}, {"correct": 2, "explanation": "Without adequate situational awareness, a pilot may accept an instruction that conflicts with the aircraft's actual position or clearance, because the mismatch is not recognised in time to challenge it.", "options": ["A pilot will always misunderstand the controller's accent.", "A pilot will be unable to tune the assigned frequency.", "A pilot may fail to notice that an instruction does not match the aircraft's position, traffic, or clearance limit."], "question": "How can 'lack of situational awareness' contribute to a communication error?"}, {"correct": 1, "explanation": "Asking for a slower repetition ensures the pilot can correctly hear, process, and act on the message, whereas pretending to understand a transmission that was not properly received creates a significant safety risk.", "options": ["It tells ATC that the aircraft is declaring an emergency.", "It gives the receiver time to copy and process the message accurately before acting.", "It allows the pilot to ignore the instruction."], "question": "Why is requesting 'Speak slower' safer than pretending to understand a fast transmission?"}, {"correct": 0, "explanation": "Seeking explicit confirmation by querying the specific detail in doubt, such as 'Confirm heading 270?', ensures that any misunderstanding is resolved before the pilot acts on a potentially incorrect clearance.", "options": ["'Confirm heading 270?'", "'Roger' without further action.", "Silence until the next instruction."], "question": "Which response best demonstrates effective communication when a pilot is unsure about a clearance?"}];
    let current = 0, score = 0, answered = false;

    function showQuestion() {
      const q = questions[current];
      const total = questions.length;
      document.getElementById('progress').textContent =
        'Question ' + (current + 1) + ' of ' + total;
      document.getElementById('question').textContent = q.question || '';

      const expl = document.getElementById('explanation');
      expl.style.display = 'none';
      expl.textContent = '';

      const opts = document.getElementById('options');
      opts.innerHTML = '';
      (q.options || []).forEach(function(text, i) {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = text;
        btn.onclick = function() { selectOption(i); };
        opts.appendChild(btn);
      });

      answered = false;
      const btnNext = document.getElementById('btn-next');
      btnNext.disabled = true;
      btnNext.style.display = '';
      btnNext.textContent = (current === total - 1) ? 'Finish' : 'Next →';
      document.getElementById('btn-retake').style.display = 'none';
      document.getElementById('score').textContent =
        'Score: ' + score + '/' + current;
    }

    function selectOption(idx) {
      if (answered) return;
      answered = true;
      const q = questions[current];
      const correct = (q.correct !== undefined) ? q.correct : 0;
      const btns = document.querySelectorAll('.option');
      btns.forEach(function(btn, i) {
        btn.disabled = true;
        if (i === correct) btn.classList.add('correct');
        else if (i === idx) btn.classList.add('wrong');
      });
      if (idx === correct) score++;
      document.getElementById('score').textContent =
        'Score: ' + score + '/' + (current + 1);
      document.getElementById('btn-next').disabled = false;
      if (q.explanation) {
        const expl = document.getElementById('explanation');
        expl.textContent = q.explanation;
        expl.style.display = 'block';
      }
    }

    function nextQ() {
      if (current < questions.length - 1) {
        current++;
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      const total = questions.length;
      const pct = total ? Math.round(score / total * 100) : 0;
      document.getElementById('progress').textContent = 'Quiz complete!';
      document.getElementById('question').textContent =
        'Final score: ' + score + '/' + total + '  (' + pct + '%)';
      document.getElementById('options').innerHTML = '';
      document.getElementById('explanation').style.display = 'none';
      document.getElementById('btn-next').style.display = 'none';
      document.getElementById('btn-retake').style.display = '';
      document.getElementById('score').textContent =
        'Score: ' + score + '/' + total;
    }

    function retake() {
      current = 0;
      score = 0;
      showQuestion();
    }

    showQuestion();
  </script>
    <footer style="text-align:center;padding:28px 16px;font-family:'SF Pro Text',Arial,sans-serif;"><a href="index.html" style="color:#7a6858;font-size:15px;text-decoration:none;border-bottom:1px solid currentColor;padding-bottom:2px;">&larr; All quizzes</a></footer>
</body>
</html>
