      card.innerHTML = `
        <div class="card-cover">
          <img src="img/${song.file}.jpg" alt="${song.title} cover" loading="lazy">
          <span class="card-play" aria-hidden="true">&#9654;</span>
        </div>
        <div class="card-body">
          <h2>${song.title}</h2>
          <p>${song.topic}</p>
        </div>
      `;
      card.addEventListener("click", () => openSong(i));
      grid.appendChild(card);
    });

    function openSong(i) {
      const song = songs[i];
      sheetCover.src = `img/${song.file}.jpg`;
      sheetCover.alt = `${song.title} cover`;
      sheetTitle.textContent = song.title;
      sheetArtist.textContent = song.artist;
      sheetTopic.innerHTML = song.link
        ? `${song.topic} &middot; <a href="${song.link.href}">${song.link.label} &rarr;</a>`
        : song.topic;
      sheetAudio.src = `audio/${song.file}.mp3`;
      sheetLyrics.innerHTML = renderLyrics(song.lyrics);
      overlay.classList.add("is-open");
      document.body.style.overflow = "hidden";
      overlay.scrollTop = 0;
    }

    function closeSong() {
      overlay.classList.remove("is-open");
      sheetAudio.pause();
      sheetAudio.removeAttribute("src");
      document.body.style.overflow = "";
    }

    document.getElementById("sheet-close").addEventListener("click", closeSong);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) closeSong(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSong(); });

    function openFromHash() {
      const file = decodeURIComponent(location.hash.slice(1));
      const i = songs.findIndex(s => s.file === file);
      if (i >= 0) openSong(i);
    }
    window.addEventListener("hashchange", openFromHash);
    openFromHash();
  </script>
</body>
</html>
